<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Мерч — наличие</title>
  <style>
    :root {
      --bg: #ffffff;
      --ink: #111111;
      --ink-muted: #777777;
      --accent: #111111;
      --surface: #f5f5f5;
      --border: #e0e0e0;
      --danger: #c42020;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111111;
        --ink: #f0f0f0;
        --ink-muted: #888888;
        --accent: #f0f0f0;
        --surface: #1a1a1a;
        --border: #2a2a2a;
      }
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 600px; margin: 0 auto; padding: 24px 16px 64px; }

    h1 {
      font-size: 2rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin: 0 0 24px;
    }

    .stats {
      display: flex;
      gap: 16px;
      margin: 0 0 24px;
    }
    .stat {
      flex: 1;
      text-align: center;
      padding: 14px 8px;
      border: 2px solid var(--ink);
      border-radius: 0;
    }
    .stat .num {
      font-size: 1.75rem;
      font-weight: 900;
    }
    .stat .lbl {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-muted);
    }

    #search {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--ink);
      border-radius: 0;
      font-size: 1rem;
      font-weight: 600;
      background: var(--bg);
      color: var(--ink);
      margin: 0 0 8px;
      outline: none;
    }
    #search::placeholder { color: var(--ink-muted); font-weight: 600; }
    #search:focus { border-color: var(--ink); }

    .fandom-group { margin: 28px 0 0; }
    .fandom-title {
      font-size: 1.1rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0 0 8px;
      margin: 0 0 12px;
      border-bottom: 3px solid var(--ink);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .fandom-title .count {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--ink-muted);
    }

    ul { list-style: none; padding: 0; display: grid; gap: 6px; }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .item:last-child { border-bottom: none; }

    .item img, .item .ph {
      width: 52px; height: 52px;
      flex-shrink: 0;
      object-fit: cover;
    }
    .item img { border: 2px solid var(--ink); }
    .item .ph {
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--ink);
      background: var(--surface);
      font-weight: 900;
      font-size: 1.1rem;
      color: var(--ink-muted);
    }

    .item .info { flex: 1; min-width: 0; }
    .item .name {
      font-weight: 700;
      font-size: 0.95rem;
      overflow-wrap: anywhere;
    }
    .item .type-tag {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--ink-muted);
    }
    .item .price {
      font-size: 0.8rem;
      font-weight: 800;
    }

    .item .qty {
      font-size: 1.3rem;
      font-weight: 900;
      flex-shrink: 0;
      text-align: right;
      min-width: 40px;
    }
    .item .qty .cap {
      display: block;
      font-size: 0.55rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
    }

    .item.zero { opacity: 0.45; }
    .item.zero .qty {
      color: var(--danger);
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .muted {
      color: var(--ink-muted);
      text-align: center;
      margin-top: 48px;
      font-weight: 600;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Мерч</h1>

    <p id="status" class="muted">Загрузка…</p>

    <div id="app" class="hidden">
      <div class="stats">
        <div class="stat"><div class="num" id="total-items">–</div><div class="lbl">позиций</div></div>
        <div class="stat"><div class="num" id="total-stock">–</div><div class="lbl">в наличии</div></div>
      </div>
      <input id="search" type="search" placeholder="Поиск по названию или фандому…" />
      <div id="list"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = '__SUPABASE_URL__'
    const SUPABASE_ANON_KEY = '__SUPABASE_ANON_KEY__'

    const $ = (id) => document.getElementById(id)
    const status = $('status')

    const configured =
      SUPABASE_URL && SUPABASE_ANON_KEY && !SUPABASE_URL.startsWith('__')
    if (!configured) {
      status.textContent =
        'Не настроено: добавьте переменные VITE_SUPABASE_URL и VITE_SUPABASE_ANON_KEY в настройках репозитория и сделайте редеплой (см. README).'
    }

    const sb = configured
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null

    const esc = (s) =>
      String(s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]))

    const rub = (n) => new Intl.NumberFormat('ru-RU').format(n) + ' ₽'

    let items = []

    function render() {
      const q = $('search').value.trim().toLowerCase()
      const visible = q
        ? items.filter((i) =>
            [i.name, i.type, i.fandom].some((f) => f && f.toLowerCase().includes(q)))
        : items

      $('total-items').textContent = visible.length
      $('total-stock').textContent = visible.reduce((s, i) => s + (i.stock_qty ?? 0), 0)

      const groups = new Map()
      for (const i of visible) {
        const key = i.fandom || 'Другое'
        if (!groups.has(key)) groups.set(key, [])
        groups.get(key).push(i)
      }

      let html = ''
      for (const [fandom, list] of groups) {
        const groupStock = list.reduce((s, i) => s + (i.stock_qty ?? 0), 0)
        html += `<div class="fandom-group">
          <div class="fandom-title">
            <span>${esc(fandom)}</span>
            <span class="count">${groupStock} шт.</span>
          </div><ul>`
        for (const i of list) {
          const qty = i.stock_qty ?? 0
          const img = i.image_url
            ? `<img src="${esc(i.image_url)}" alt="" loading="lazy" />`
            : `<div class="ph">${esc((i.fandom || '★').charAt(0).toUpperCase())}</div>`
          html += `<li class="item${qty <= 0 ? ' zero' : ''}">
            ${img}
            <div class="info">
              <div class="name">${esc(i.name)}</div>
              ${i.type ? `<div class="type-tag">${esc(i.type)}</div>` : ''}
              ${i.sale_price != null ? `<div class="price">${esc(rub(i.sale_price))}</div>` : ''}
            </div>
            <div class="qty">${qty > 0 ? qty + '<span class="cap">шт.</span>' : 'нет'}</div>
          </li>`
        }
        html += '</ul></div>'
      }
      $('list').innerHTML = html || '<p class="muted">Ничего не найдено.</p>'
    }

    async function loadItems() {
      const { data, error } = await sb
        .from('public_stock')
        .select('id, type, fandom, name, image_url, sale_price, stock_qty')
        .order('fandom', { ascending: true, nullsFirst: false })
        .order('name')
      if (error) {
        status.textContent =
          'Не удалось загрузить: ' + error.message +
          ' — если ошибка про "public_stock", выполните supabase/public_stock_view.sql в SQL Editor Supabase (см. README).'
        return
      }
      items = data
      status.classList.add('hidden')
      $('app').classList.remove('hidden')
      render()
    }

    if (configured) {
      loadItems()
      $('search').addEventListener('input', render)
    }
  </script>
</body>
</html>
