<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HEHEARSE — мерч</title>
  <style>
    :root {
      --bg: #ffffff;
      --ink: #111111;
      --ink-muted: #777777;
      --surface: #f5f5f5;
      --border: #e0e0e0;
      --danger: #c42020;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111111;
        --ink: #f0f0f0;
        --ink-muted: #888888;
        --surface: #1a1a1a;
        --border: #2a2a2a;
      }
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 600px; margin: 0 auto; padding: 24px 16px 64px; }

    /* ---- header ---- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 24px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .tg-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 2px solid var(--ink);
      text-decoration: none;
      color: var(--ink);
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: background 0.2s, color 0.2s;
    }
    .tg-link:hover, .tg-link:active {
      background: var(--ink);
      color: var(--bg);
    }
    .tg-link svg { width: 16px; height: 16px; fill: currentColor; }

    /* ---- search ---- */
    #search {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--ink);
      border-radius: 0;
      font-size: 1rem;
      font-weight: 600;
      background: var(--bg);
      color: var(--ink);
      margin: 0 0 8px;
      outline: none;
      transition: border-color 0.2s;
    }
    #search::placeholder { color: var(--ink-muted); font-weight: 600; }
    #search:focus { border-color: var(--ink-muted); }

    /* ---- fandom groups ---- */
    .fandom-group { margin: 28px 0 0; }
    .fandom-title {
      font-size: 1.1rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0 0 8px;
      margin: 0 0 12px;
      border-bottom: 3px solid var(--ink);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .fandom-title .count {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--ink-muted);
    }

    ul { list-style: none; padding: 0; display: grid; gap: 0; }

    /* ---- items ---- */
    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.4s ease forwards;
    }
    .item:last-child { border-bottom: none; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .item img, .item .ph {
      width: 52px; height: 52px;
      flex-shrink: 0;
      object-fit: cover;
      transition: transform 0.2s ease;
    }
    .item:hover img, .item:hover .ph { transform: scale(1.08); }
    .item img { border: 2px solid var(--ink); }
    .item .ph {
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--ink);
      background: var(--surface);
      font-weight: 900;
      font-size: 1.1rem;
      color: var(--ink-muted);
    }

    .item .info { flex: 1; min-width: 0; }
    .item .name {
      font-weight: 700;
      font-size: 0.95rem;
      overflow-wrap: anywhere;
    }
    .item .type-tag {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--ink-muted);
    }
    .item .price {
      font-size: 0.8rem;
      font-weight: 800;
    }

    .item .qty {
      font-size: 1.3rem;
      font-weight: 900;
      flex-shrink: 0;
      text-align: right;
      min-width: 40px;
    }
    .item .qty .cap {
      display: block;
      font-size: 0.55rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
    }

    .item.zero { opacity: 0; animation: fadeUp 0.4s ease forwards; }
    .item.zero .item-inner { opacity: 0.45; }
    .item.zero .qty {
      color: var(--danger);
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    /* ---- fandom title animation ---- */
    .fandom-group {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.35s ease forwards;
    }

    .muted {
      color: var(--ink-muted);
      text-align: center;
      margin-top: 48px;
      font-weight: 600;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>Hehearse</h1>
      <a class="tg-link" href="https://t.me/hehearse_exe" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0h-.056zm4.962 7.224c.1-.002.321.023.465.14a.5.5 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.479.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
        ТГ
      </a>
    </div>

    <p id="status" class="muted">Загрузка…</p>

    <div id="app" class="hidden">
      <input id="search" type="search" placeholder="Поиск по названию или фандому…" />
      <div id="list"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = '__SUPABASE_URL__'
    const SUPABASE_ANON_KEY = '__SUPABASE_ANON_KEY__'

    const $ = (id) => document.getElementById(id)
    const status = $('status')

    const configured =
      SUPABASE_URL && SUPABASE_ANON_KEY && !SUPABASE_URL.startsWith('__')
    if (!configured) {
      status.textContent =
        'Не настроено: добавьте переменные VITE_SUPABASE_URL и VITE_SUPABASE_ANON_KEY в настройках репозитория и сделайте редеплой (см. README).'
    }

    const sb = configured
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null

    const esc = (s) =>
      String(s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]))

    const rub = (n) => new Intl.NumberFormat('ru-RU').format(n) + ' ₽'

    let items = []

    function render() {
      const q = $('search').value.trim().toLowerCase()
      const visible = q
        ? items.filter((i) =>
            [i.name, i.type, i.fandom].some((f) => f && f.toLowerCase().includes(q)))
        : items

      const groups = new Map()
      for (const i of visible) {
        const key = i.fandom || 'Другое'
        if (!groups.has(key)) groups.set(key, [])
        groups.get(key).push(i)
      }

      let html = ''
      let itemIdx = 0
      for (const [fandom, list] of groups) {
        const groupStock = list.reduce((s, i) => s + (i.stock_qty ?? 0), 0)
        const groupDelay = itemIdx * 30
        html += `<div class="fandom-group" style="animation-delay:${groupDelay}ms">
          <div class="fandom-title">
            <span>${esc(fandom)}</span>
            <span class="count">${groupStock} шт.</span>
          </div><ul>`
        for (const i of list) {
          const qty = i.stock_qty ?? 0
          const delay = (itemIdx + 1) * 30
          const img = i.image_url
            ? `<img src="${esc(i.image_url)}" alt="" loading="lazy" />`
            : `<div class="ph">${esc((i.fandom || '★').charAt(0).toUpperCase())}</div>`
          html += `<li class="item${qty <= 0 ? ' zero' : ''}" style="animation-delay:${delay}ms">
            ${img}
            <div class="info">
              <div class="name">${esc(i.name)}</div>
              ${i.type ? `<div class="type-tag">${esc(i.type)}</div>` : ''}
              ${i.sale_price != null ? `<div class="price">${esc(rub(i.sale_price))}</div>` : ''}
            </div>
            <div class="qty">${qty > 0 ? qty + '<span class="cap">шт.</span>' : 'нет'}</div>
          </li>`
          itemIdx++
        }
        html += '</ul></div>'
      }
      $('list').innerHTML = html || '<p class="muted">Ничего не найдено.</p>'
    }

    async function loadItems() {
      const { data, error } = await sb
        .from('public_stock')
        .select('id, type, fandom, name, image_url, sale_price, stock_qty')
        .order('fandom', { ascending: true, nullsFirst: false })
        .order('name')
      if (error) {
        status.textContent =
          'Не удалось загрузить: ' + error.message +
          ' — если ошибка про "public_stock", выполните supabase/public_stock_view.sql в SQL Editor Supabase (см. README).'
        return
      }
      items = data
      status.classList.add('hidden')
      $('app').classList.remove('hidden')
      render()
    }

    if (configured) {
      loadItems()
      $('search').addEventListener('input', render)
    }
  </script>
</body>
</html>
