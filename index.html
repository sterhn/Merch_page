  <style>
    :root {
      --bg: #110e16;
      --surface: #1a1520;
      --ink: #ede5da;
      --muted: #8a7e72;
      --faint: #5a5148;
      --accent: #5aa0a0;
      --accent-soft: rgba(90,160,160,0.25);
      --page-accent: #5aa0a0;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
      --mono: ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }
    a { color: var(--accent); transition: color 0.2s; }
    a:hover { color: #7dbdbd; }
    ::selection { background: color-mix(in srgb, var(--page-accent) 35%, transparent); color: var(--ink); }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(138,126,114,0.25); border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(138,126,114,0.4); }

    /* Atmospheric background */
    .atmo { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .atmo-blob {
      position: absolute; filter: blur(80px);
      animation: warmGlow 8s ease-in-out infinite;
    }
    .atmo-1 { top: -20%; right: -10%; width: 600px; height: 600px; background: radial-gradient(circle, color-mix(in srgb, var(--page-accent) 15%, transparent) 0%, transparent 70%); }
    .atmo-2 { bottom: -10%; left: -15%; width: 500px; height: 500px; background: radial-gradient(circle, color-mix(in srgb, var(--page-accent) 10%, transparent) 0%, transparent 70%); animation-delay: 3s; animation-duration: 10s; }
    .atmo-3 { top: 40%; left: 50%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(166,75,107,0.06) 0%, transparent 70%); animation-delay: 6s; animation-duration: 12s; }
    @keyframes warmGlow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.5; } }

    /* Grain */
    .grain {
      position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 256px;
    }

    .wrap { position: relative; z-index: 2; max-width: 860px; margin: 0 auto; padding: 48px 24px 120px; }

    /* Header */
    .header { text-align: center; margin-bottom: 48px; padding-top: 24px; animation: fadeUp .8s ease both; }
    .header h1 {
      font-family: var(--serif);
      font-size: clamp(2.2rem, 9vw, 3.6rem);
      font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; margin: 0 0 8px;
      background: linear-gradient(90deg, #c8b8a8, #f0e8de 30%, var(--page-accent) 50%, #f0e8de 70%, #c8b8a8);
      background-size: 200% 100%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: headerShimmer 6s ease-in-out infinite;
      filter: drop-shadow(0 0 40px rgba(90,160,160,0.2));
    }
    @keyframes headerShimmer { 0%, 100% { background-position: 100% 0; } 50% { background-position: 0% 0; } }
    .header-rule { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 24px; }
    .header-rule .line { flex: 1; max-width: 120px; height: 1px; }
    .header-rule .line-l { background: linear-gradient(to right, transparent, color-mix(in srgb, var(--page-accent) 40%, transparent)); }
    .header-rule .line-r { background: linear-gradient(to left, transparent, color-mix(in srgb, var(--page-accent) 40%, transparent)); }
    .header-ornament {
      font-size: 1rem; color: var(--page-accent); opacity: 0.7;
      animation: ornamentPulse 3s ease-in-out infinite;
      text-shadow: 0 0 12px color-mix(in srgb, var(--page-accent) 40%, transparent);
      transition: color .6s;
    }
    .epigraph {
      font-family: var(--serif); font-style: italic;
      font-size: .95rem; color: var(--muted); letter-spacing: .06em;
      margin: -6px 0 22px;
    }
    @keyframes ornamentPulse { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.15); } }
    .tg-link {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 24px; border: 1px solid rgba(90,160,160,0.3);
      color: var(--accent); text-decoration: none;
      font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .12em;
      transition: all .3s; background: rgba(90,160,160,0.05);
    }
    .tg-link:hover { background: rgba(90,160,160,0.12); border-color: rgba(90,160,160,0.5); box-shadow: 0 0 30px rgba(90,160,160,0.1); color: #7dbdbd; }
    .tg-link svg { width: 14px; height: 14px; fill: currentColor; }

    /* Controls: search, filter chips, totals */
    .controls { margin-bottom: 40px; animation: fadeUp .8s ease both .15s; opacity: 0; }
    #search {
      width: 100%; padding: 14px 20px;
      border: 1px solid rgba(90,160,160,0.2); border-radius: 2px;
      font-size: .9rem; font-weight: 500;
      background: rgba(26,21,32,0.8); color: var(--ink);
      outline: none; transition: border-color .3s, box-shadow .3s;
      font-family: var(--sans);
      backdrop-filter: blur(10px);
    }
    #search::placeholder { color: var(--faint); }
    #search:focus { border-color: rgba(90,160,160,0.4); box-shadow: 0 0 20px rgba(90,160,160,0.08); }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .chip {
      padding: 8px 14px; border: 1px solid rgba(138,126,114,0.25); border-radius: 2px;
      background: transparent; color: var(--muted); cursor: pointer;
      font-family: var(--sans); font-size: .68rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .1em;
      transition: all .2s;
    }
    .chip:hover { border-color: var(--accent-soft); color: var(--accent); }
    .chip.active {
      border-color: rgba(90,160,160,0.5); color: var(--accent);
      background: rgba(90,160,160,0.1);
    }
    .chip-stock { margin-left: auto; border-style: dashed; }
    .totals {
      margin-top: 14px; text-align: right;
      font-family: var(--serif); font-style: italic;
      font-size: .9rem; color: var(--faint); letter-spacing: .04em;
    }

    /* Status */
    .status {
      text-align: center; color: var(--muted);
      font-family: var(--serif);
      font-style: italic; font-size: 1.05rem;
    }

    /* Skeleton loading */
    .sk-header { height: 22px; width: 180px; margin-bottom: 20px; }
    .sk-card { aspect-ratio: 1 / 1.35; }
    .sk {
      background: linear-gradient(100deg, rgba(31,26,40,0.8) 40%, rgba(50,42,62,0.8) 50%, rgba(31,26,40,0.8) 60%);
      background-size: 200% 100%;
      animation: skShimmer 1.4s ease-in-out infinite;
      border: 1px solid rgba(138,126,114,0.08);
    }
    @keyframes skShimmer { 0% { background-position: 120% 0; } 100% { background-position: -80% 0; } }

    /* Fandom groups */
    .fandom-group { margin-bottom: 48px; }
    .fandom-header {
      display: flex; align-items: baseline; gap: 12px;
      margin-bottom: 20px; padding-bottom: 12px;
    }
    .fandom-header .orn { font-size: .75rem; opacity: .7; align-self: center; }
    .fandom-header h2 {
      font-family: var(--serif);
      font-size: 1.5rem; font-weight: 700; color: var(--ink);
      margin: 0; letter-spacing: .04em;
    }
    .fandom-count {
      font-family: var(--serif); font-style: italic;
      font-size: .95rem; color: var(--faint);
    }
    .fandom-header .line { flex: 1; height: 1px; }

    /* Card grid */
    .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    @media (min-width: 640px) { .card-grid { grid-template-columns: repeat(3, 1fr); } }
    .card {
      background: rgba(31,26,40,0.6); border: 1px solid rgba(138,126,114,0.1);
      overflow: hidden; transition: transform .3s, box-shadow .3s, border-color .3s; position: relative;
    }
    .card::before, .card::after {
      content: ''; position: absolute; width: 14px; height: 14px; z-index: 3;
      border: 0 solid var(--fc, var(--accent));
      opacity: 0; transition: opacity .3s; pointer-events: none;
    }
    .card::before { top: 6px; left: 6px; border-top-width: 1px; border-left-width: 1px; }
    .card::after { bottom: 6px; right: 6px; border-bottom-width: 1px; border-right-width: 1px; }
    .card:hover::before, .card:hover::after { opacity: .8; }
    .card:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 20px rgba(90,160,160,0.08); border-color: rgba(90,160,160,0.25); }
    .card.sold-out { opacity: 0.5; }
    .card-img {
      width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative; cursor: pointer;
    }
    .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s ease, filter .4s; }
    .card:hover .card-img img { transform: scale(1.06); }
    .card-img .ph {
      font-family: var(--serif);
      font-size: 2rem; font-weight: 600; opacity: 0.4;
      transition: transform .4s ease;
    }
    .card:hover .card-img .ph { transform: scale(1.1); }
    .card-idx {
      position: absolute; top: 10px; left: 10px;
      font-family: var(--mono); font-size: .6rem; letter-spacing: .1em;
      color: var(--muted); background: rgba(17,14,22,0.6);
      padding: 3px 6px; backdrop-filter: blur(8px);
    }
    .stock-badge {
      position: absolute; top: 10px; right: 10px;
      padding: 4px 10px; backdrop-filter: blur(8px);
      color: var(--muted); font-size: .65rem; font-weight: 600;
      letter-spacing: .05em; text-transform: uppercase;
    }
    .stock-badge.in-stock { background: rgba(17,14,22,0.75); }

    /* Sold-out rubber stamp */
    .stamp {
      position: absolute; left: 50%; top: 50%; z-index: 2;
      transform: translate(-50%, -50%) rotate(-12deg);
      border: 2px solid rgba(196,85,85,0.85); border-radius: 3px;
      color: rgba(228,124,124,0.95); background: rgba(17,14,22,0.35);
      padding: 5px 12px; font-size: .68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .18em; white-space: nowrap;
      box-shadow: inset 0 0 6px rgba(196,85,85,0.25);
      text-shadow: 0 0 1px rgba(228,124,124,0.6);
      pointer-events: none;
    }
    .detail-img .stamp {
      font-size: 1.05rem; padding: 9px 22px; border-width: 3px; letter-spacing: .24em;
    }

    /* Holographic foil shine */
    .holo {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      opacity: 0; transition: opacity .4s;
      background: linear-gradient(115deg,
        transparent 20%,
        rgba(255,120,180,0.28) 36%,
        rgba(120,220,255,0.28) 44%,
        rgba(255,230,140,0.24) 52%,
        rgba(160,255,180,0.24) 60%,
        transparent 76%);
      background-size: 250% 250%;
      background-position: calc(var(--hx, 50) * 1%) calc(var(--hy, 50) * 1%);
      mix-blend-mode: color-dodge;
      filter: saturate(1.4);
    }
    .card:hover .card-img .holo { opacity: .45; }
    .detail-overlay.open .detail-img .holo { opacity: .4; }
    .card-info { padding: 10px 12px 12px; }
    .card-type {
      font-size: .55rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .12em; margin-bottom: 3px;
    }
    .card-name {
      font-family: var(--serif);
      font-size: .95rem; font-weight: 600; color: var(--ink);
      margin-bottom: 8px; line-height: 1.3;
    }
    .card-bottom { display: flex; align-items: center; justify-content: space-between; }
    .card-price { font-family: var(--serif); font-size: 1rem; font-weight: 700; color: var(--accent); }
    .add-btn {
      min-width: 40px; height: 40px; padding: 0 10px;
      border: 1px solid rgba(138,126,114,0.25); background: transparent;
      color: var(--muted); font-size: .9rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; font-family: var(--sans);
    }
    .add-btn:hover { border-color: rgba(90,160,160,0.5); color: var(--accent); background: rgba(90,160,160,0.08); }
    .add-btn.in-cart { border-color: rgba(90,160,160,0.5); background: rgba(90,160,160,0.12); color: var(--accent); }

    /* Detail overlay */
    .detail-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(11,9,14,0.85); backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .3s;
      padding: 20px; perspective: 1000px;
    }
    .detail-overlay.open { opacity: 1; pointer-events: auto; }
    .detail-card {
      background: var(--surface); border: 1px solid rgba(90,160,160,0.15);
      max-width: 360px; width: 100%; max-height: 85vh; overflow-y: auto;
      transform: translateY(30px) scale(0.95); transition: transform .35s cubic-bezier(.4,0,.2,1);
      position: relative;
    }
    .detail-overlay.open .detail-card {
      transform: translateY(0) scale(1) rotateX(var(--ry, 0deg)) rotateY(var(--rx, 0deg));
    }
    .detail-card.tilting { transition: transform .08s linear; }
    .detail-close {
      position: absolute; top: 12px; right: 12px; z-index: 2;
      width: 36px; height: 36px; border: 1px solid rgba(138,126,114,0.3);
      background: rgba(17,14,22,0.8); backdrop-filter: blur(8px);
      color: var(--muted); font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all .2s;
    }
    .detail-close:hover { background: rgba(138,126,114,0.15); color: var(--ink); }
    .detail-img {
      width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .detail-img img { width: 100%; height: 100%; object-fit: cover; }
    .detail-img .ph {
      font-family: var(--serif);
      font-size: 4rem; font-weight: 600; opacity: 0.3;
    }
    .detail-info { padding: 20px; }
    .detail-type {
      font-size: .6rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .12em; margin-bottom: 4px;
    }
    .detail-fandom {
      font-size: .65rem; color: var(--faint); letter-spacing: .08em;
      margin-bottom: 8px;
    }
    .detail-name {
      font-family: var(--serif);
      font-size: 1.4rem; font-weight: 700; color: var(--ink);
      line-height: 1.3; margin-bottom: 10px;
    }
    .detail-desc {
      font-size: .85rem; color: var(--muted); line-height: 1.6;
      margin-bottom: 16px;
    }
    .detail-bottom {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 14px; border-top: 1px solid rgba(138,126,114,0.1);
    }
    .detail-price {
      font-family: var(--serif);
      font-size: 1.3rem; font-weight: 700; color: var(--accent);
    }
    .detail-add {
      padding: 10px 20px; min-height: 40px; border: 1px solid rgba(90,160,160,0.4);
      background: rgba(90,160,160,0.08); color: var(--accent);
      font-family: var(--sans);
      font-size: .75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .08em; cursor: pointer; transition: all .2s;
    }
    .detail-add:hover { background: rgba(90,160,160,0.18); border-color: rgba(90,160,160,0.6); }
    .detail-add.in-cart { background: rgba(90,160,160,0.15); }
    .detail-sold { color: var(--faint); font-size: .75rem; font-style: italic; font-family: var(--serif); }
    .detail-share {
      width: 100%; margin-top: 14px; padding: 10px;
      border: 1px dashed rgba(138,126,114,0.3); background: transparent;
      color: var(--muted); font-family: var(--sans);
      font-size: .68rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .12em; cursor: pointer; transition: all .2s;
    }
    .detail-share:hover { border-color: var(--accent-soft); color: var(--accent); }
    .detail-share.copied { border-style: solid; border-color: rgba(90,160,160,0.5); color: var(--accent); }

    /* Star flying to cart */
    .fly-star {
      position: fixed; z-index: 400; pointer-events: none;
      color: var(--accent); font-size: 1.2rem;
      text-shadow: 0 0 10px rgba(90,160,160,0.8);
    }
    .cart-badge.pulse { animation: badgePulse .5s ease; }
    @keyframes badgePulse { 0% { transform: scale(1); } 40% { transform: scale(1.35); } 100% { transform: scale(1); } }

    /* Animations */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { opacity: 0; animation: fadeUp .5s ease both; }

    /* Footer */
    .footer {
      margin-top: 64px; padding-top: 24px; text-align: center;
    }
    .footer-rule { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 16px; }
    .footer-rule .line { flex: 1; max-width: 120px; height: 1px; }
    .footer-rule .line-l { background: linear-gradient(to right, transparent, rgba(138,126,114,0.3)); }
    .footer-rule .line-r { background: linear-gradient(to left, transparent, rgba(138,126,114,0.3)); }
    .footer-rule .orn { font-size: .8rem; color: var(--faint); }
    .footer span {
      font-family: var(--serif);
      font-size: .8rem; font-style: italic; color: var(--faint); letter-spacing: .1em;
    }

    /* Cart bar — ticket stub */
    .cart-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: linear-gradient(135deg, #1a2a2a 0%, #1a1f28 100%);
      border-top: 1px dashed rgba(90,160,160,0.35);
      transform: translateY(100%); transition: transform .4s cubic-bezier(.4,0,.2,1);
      backdrop-filter: blur(20px);
    }
    .cart-bar::before {
      content: ''; position: absolute; top: -1px; left: 0; right: 0; height: 8px;
      background: radial-gradient(circle at 7px 0, var(--bg) 4px, transparent 4.5px);
      background-size: 16px 8px; background-repeat: repeat-x;
      pointer-events: none;
    }
    .cart-bar.visible { transform: translateY(0); }
    .cart-bar-inner {
      max-width: 860px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px 14px; cursor: pointer;
    }
    .cart-bar-left { display: flex; align-items: center; gap: 12px; }
    .cart-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #4a8f8f, #5aa0a0);
      color: #fff; font-size: .8rem; font-weight: 700;
    }
    .cart-bar-label {
      font-family: var(--serif);
      font-size: .9rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .1em; color: var(--ink);
    }
    .cart-bar-total {
      font-family: var(--serif);
      font-size: 1.15rem; font-weight: 700; color: var(--accent);
    }

    /* Cart panel */
    .cart-overlay {
      position: fixed; inset: 0; background: rgba(11,9,14,0.7);
      backdrop-filter: blur(8px); z-index: 200;
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .cart-overlay.open { opacity: 1; pointer-events: auto; }
    .cart-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
      background: var(--surface); border-top: 1px solid rgba(90,160,160,0.2);
      max-height: 80vh; overflow-y: auto;
      transform: translateY(100%); transition: transform .4s cubic-bezier(.4,0,.2,1);
    }
    .cart-panel.open { transform: translateY(0); }
    .cart-panel-inner { max-width: 860px; margin: 0 auto; padding: 24px 24px 32px; }
    .cart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .cart-title {
      font-family: var(--serif);
      font-size: 1.3rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
    }
    .cart-close {
      width: 40px; height: 40px; border: 1px solid rgba(138,126,114,0.3);
      background: transparent; color: var(--muted);
      font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all .2s;
    }
    .cart-close:hover { background: rgba(138,126,114,0.1); color: var(--ink); }
    .cart-item {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 0; border-bottom: 1px solid rgba(138,126,114,0.1);
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item .info { flex: 1; min-width: 0; }
    .cart-item .name {
      font-family: var(--serif);
      font-weight: 600; font-size: .95rem; color: var(--ink);
    }
    .cart-item .type-tag { font-size: .6rem; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--faint); }
    .cart-item .cart-price { font-size: .8rem; font-weight: 700; color: var(--accent); margin-top: 2px; }
    .qty-controls { display: flex; align-items: center; flex-shrink: 0; }
    .qty-btn {
      width: 40px; height: 40px; border: 1px solid rgba(138,126,114,0.25);
      background: transparent; color: var(--muted);
      font-size: 1rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .qty-btn:hover { background: rgba(138,126,114,0.1); color: var(--ink); }
    .qty-val {
      width: 40px; height: 40px;
      border-top: 1px solid rgba(138,126,114,0.25);
      border-bottom: 1px solid rgba(138,126,114,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; font-weight: 700; color: var(--ink);
    }
    .cart-total-row {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-top: 20px; padding-top: 16px;
      border-top: 1px solid rgba(90,160,160,0.2);
    }
    .cart-total-label {
      font-family: var(--serif);
      font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
    }
    .cart-total-val {
      font-family: var(--serif);
      font-size: 1.4rem; font-weight: 700; color: var(--accent);
    }
    .send-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 14px; margin-top: 16px; border: none;
      background: linear-gradient(135deg, #4a8f8f 0%, #3a7575 100%);
      color: #f0e8de;
      font-family: var(--serif);
      font-size: .95rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; text-decoration: none; cursor: pointer; transition: all .3s;
    }
    .send-btn:hover { background: linear-gradient(135deg, #5aa0a0 0%, #4a8f8f 100%); box-shadow: 0 8px 30px rgba(74,143,143,0.3); transform: translateY(-1px); color: #f0e8de; }
    .send-btn svg { width: 16px; height: 16px; fill: currentColor; }
    .cart-actions { display: flex; gap: 8px; margin-top: 10px; }
    .copy-btn {
      flex: 1; padding: 12px 10px; border: 1px solid rgba(90,160,160,0.25);
      background: transparent; color: var(--accent);
      font-size: .7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .1em; cursor: pointer; transition: all .2s;
      font-family: var(--sans);
    }
    .copy-btn:hover { border-color: rgba(90,160,160,0.5); background: rgba(90,160,160,0.08); }
    .copy-btn.copied { border-color: rgba(90,160,160,0.5); background: rgba(90,160,160,0.12); }
    .clear-btn {
      flex: 1; padding: 12px 10px;
      border: 1px solid rgba(138,126,114,0.2); background: transparent;
      color: var(--faint); font-size: .7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .1em; cursor: pointer; transition: all .2s;
      font-family: var(--sans);
    }
    .clear-btn:hover { border-color: rgba(255,60,60,0.4); color: #c45555; }
    .cart-empty {
      text-align: center; padding: 24px 0; color: var(--faint);
      font-style: italic; font-family: var(--serif);
    }
    .hidden { display: none !important; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .fade-in, .controls, .header { opacity: 1 !important; transform: none !important; animation: none !important; }
      .card:hover { transform: none; }
      .card:hover .card-img img, .card:hover .card-img .ph { transform: none; }
      .holo, .fly-star { display: none !important; }
      .detail-overlay.open .detail-card { transform: none; }
    }
  </style>
</head>
<body>
  <div class="atmo">
    <div class="atmo-blob atmo-1"></div>
    <div class="atmo-blob atmo-2"></div>
    <div class="atmo-blob atmo-3"></div>
  </div>
  <div class="grain"></div>

  <div class="wrap">
    <header class="header">
      <h1>Hehearse</h1>
      <div class="header-rule">
        <div class="line line-l"></div>
        <span class="header-ornament">&#10022;</span>
        <div class="line line-r"></div>
      </div>
      <p class="epigraph" id="epigraph"></p>
      <a class="tg-link" href="https://t.me/hehearse_exe" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0h-.056zm4.962 7.224c.1-.002.321.023.465.14a.5.5 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.479.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
        Telegram
      </a>
    </header>

    <div class="controls">
      <input id="search" type="search" placeholder="Поиск по названию или фандому…" />
      <div id="chips" class="chips hidden"></div>
      <div id="totals" class="totals hidden"></div>
    </div>

    <p id="status" class="status hidden"></p>
    <div id="app">
      <div id="list"></div>
    </div>

    <div class="footer">
      <div class="footer-rule">
        <div class="line line-l"></div>
        <span class="orn">&#10022;</span>
        <div class="line line-r"></div>
      </div>
      <span>hehearse.exe</span>
    </div>
  </div>

  <!-- Cart bar -->
  <div id="cart-bar" class="cart-bar">
    <div class="cart-bar-inner" onclick="toggleCart()">
      <div class="cart-bar-left">
        <span class="cart-badge" id="cart-count">0</span>
        <span class="cart-bar-label">Корзина</span>
      </div>
      <span class="cart-bar-total" id="cart-bar-total">0 ₽</span>
    </div>
  </div>

  <!-- Cart panel -->
  <div id="cart-overlay" class="cart-overlay" onclick="toggleCart()"></div>
  <div id="cart-panel" class="cart-panel">
    <div class="cart-panel-inner">
      <div class="cart-header">
        <span class="cart-title">Ваш заказ</span>
        <button class="cart-close" onclick="toggleCart()" aria-label="Закрыть корзину">✕</button>
      </div>
      <div id="cart-items"></div>
      <div id="cart-footer" class="hidden">
        <div class="cart-total-row">
          <span class="cart-total-label">Итого</span>
          <span class="cart-total-val" id="cart-total">0 ₽</span>
        </div>
        <a id="send-order" class="send-btn" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0h-.056zm4.962 7.224c.1-.002.321.023.465.14a.5.5 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.479.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
          Отправить заказ в ТГ
        </a>
        <div class="cart-actions">
          <button class="copy-btn" id="copy-btn" onclick="copyOrder()">Копировать текст</button>
          <button class="clear-btn" onclick="clearCart()">Очистить</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail overlay -->
  <div id="detail-overlay" class="detail-overlay" onclick="closeDetail(event)">
    <div class="detail-card" id="detail-card">
      <button class="detail-close" onclick="closeDetail(event)" aria-label="Закрыть">&#10005;</button>
      <div id="detail-img" class="detail-img"></div>
      <div id="detail-info" class="detail-info"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = '__SUPABASE_URL__'
    const SUPABASE_ANON_KEY = '__SUPABASE_ANON_KEY__'
    const TG_CHANNEL = 'mshewill'

    const $ = (id) => document.getElementById(id)
    const status = $('status')

    const configured =
      SUPABASE_URL && SUPABASE_ANON_KEY && !SUPABASE_URL.startsWith('__')
    if (!configured) {
      status.textContent =
        'Не настроено: добавьте переменные VITE_SUPABASE_URL и VITE_SUPABASE_ANON_KEY в настройках репозитория и сделайте редеплой (см. README).'
      status.classList.remove('hidden')
    }

    const sb = configured
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null

    const esc = (s) =>
      String(s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]))

    const rub = (n) => new Intl.NumberFormat('ru-RU').format(n) + ' ₽'

    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches

    const EPIGRAPHS = [
      'маленькие артефакты больших историй',
      'для тех, кто узнаёт своих по значкам',
      'собрано вручную, с любовью к деталям',
      'мерч, который находит своих',
      'носи свои миры с собой',
    ]
    $('epigraph').textContent = EPIGRAPHS[Math.floor(Math.random() * EPIGRAPHS.length)]

    const plural = (n, one, few, many) => {
      const m10 = n % 10, m100 = n % 100
      if (m10 === 1 && m100 !== 11) return one
      if (m10 >= 2 && m10 <= 4 && (m100 < 12 || m100 > 14)) return few
      return many
    }

    let items = []
    let cart = {}
    let typeList = []
    let typeFilter = null
    let stockOnly = false
    let firstRender = true

    const fandomColors = ['#4a8f8f', '#5aa0a0', '#a64b6b', '#7b6ba4', '#8a6e4e', '#5a8a6e']
    let fandomColor = new Map()

    function buildFandomColors() {
      fandomColor = new Map()
      let idx = 0
      for (const i of items) {
        const key = i.fandom || 'Другое'
        if (!fandomColor.has(key)) {
          fandomColor.set(key, fandomColors[idx % fandomColors.length])
          idx++
        }
      }
    }

    function loadCart() {
      try {
        const saved = localStorage.getItem('hehearse_cart')
        if (saved) cart = JSON.parse(saved)
      } catch {}
    }
    function saveCart() {
      localStorage.setItem('hehearse_cart', JSON.stringify(cart))
    }

    function addToCart(id, sourceEl) {
      const item = items.find((i) => i.id === id)
      if (!item || (item.stock_qty ?? 0) <= 0) return
      const max = item.stock_qty ?? 0
      const before = cart[id] || 0
      cart[id] = Math.min(before + 1, max)
      saveCart()
      updateCartUI()
      updateAddBtn(id)
      if (sourceEl && cart[id] > before) flyToCart(sourceEl)
    }

    function flyToCart(fromEl) {
      if (prefersReduced) return
      const from = fromEl.getBoundingClientRect()
      const to = $('cart-count').getBoundingClientRect()
      const star = document.createElement('span')
      star.className = 'fly-star'
      star.textContent = '✦'
      star.style.left = from.left + from.width / 2 + 'px'
      star.style.top = from.top + from.height / 2 + 'px'
      document.body.appendChild(star)
      const dx = to.left + to.width / 2 - (from.left + from.width / 2)
      const dy = to.top + to.height / 2 - (from.top + from.height / 2)
      star.animate([
        { transform: 'translate(-50%,-50%) scale(1) rotate(0deg)', opacity: 1 },
        { transform: `translate(calc(-50% + ${dx * 0.5}px), calc(-50% + ${dy * 0.5 - 50}px)) scale(1.5) rotate(120deg)`, opacity: 1, offset: 0.5 },
        { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(0.3) rotate(240deg)`, opacity: 0.2 },
      ], { duration: 650, easing: 'cubic-bezier(.3,0,.4,1)' }).onfinish = () => {
        star.remove()
        const badge = $('cart-count')
        badge.classList.remove('pulse')
        void badge.offsetWidth
        badge.classList.add('pulse')
      }
    }

    function updateAddBtn(id) {
      const btn = document.querySelector(`.add-btn[data-id="${id}"]`)
      if (!btn) return
      const qty = cart[id] || 0
      if (qty > 0) {
        btn.classList.add('in-cart')
        btn.textContent = qty
      } else {
        btn.classList.remove('in-cart')
        btn.textContent = '+'
      }
    }

    function setQty(id, qty) {
      const item = items.find((i) => i.id === id)
      if (!item) return
      const max = item.stock_qty ?? 0
      if (qty <= 0) {
        delete cart[id]
      } else {
        cart[id] = Math.min(qty, max)
      }
      saveCart()
      updateCartUI()
      updateAddBtn(id)
    }

    function clearCart() {
      const ids = Object.keys(cart)
      cart = {}
      saveCart()
      updateCartUI()
      ids.forEach(updateAddBtn)
      toggleCart()
    }

    function getCartItems() {
      return Object.entries(cart)
        .map(([id, qty]) => {
          const item = items.find((i) => i.id === id)
          if (!item || qty <= 0) return null
          return { ...item, cartQty: qty }
        })
        .filter(Boolean)
    }

    function getCartTotal() {
      return getCartItems().reduce(
        (sum, i) => sum + (i.sale_price || 0) * i.cartQty, 0)
    }

    function getCartCount() {
      return Object.values(cart).reduce((s, q) => s + q, 0)
    }

    function buildTgMessage() {
      const ci = getCartItems()
      if (!ci.length) return ''
      let msg = 'Привет! Хочу заказать:\n\n'
      for (const i of ci) {
        const line = `• ${i.name}`
          + (i.type ? ` (${i.type})` : '')
          + ` × ${i.cartQty}`
          + (i.sale_price ? ` — ${rub(i.sale_price * i.cartQty)}` : '')
        msg += line + '\n'
      }
      msg += `\nИтого: ${rub(getCartTotal())}`
      msg += '\n\n---\n'
      const data = ci.map((i) => ({
        id: i.id,
        name: i.name,
        type: i.type,
        qty: i.cartQty,
        price: i.sale_price,
      }))
      msg += 'import:' + JSON.stringify(data)
      return msg
    }

    function updateCartUI() {
      const count = getCartCount()
      const total = getCartTotal()
      $('cart-count').textContent = count
      $('cart-bar-total').textContent = rub(total)
      $('cart-bar').classList.toggle('visible', count > 0)

      const ci = getCartItems()
      if (!ci.length) {
        $('cart-items').innerHTML = '<div class="cart-empty">Корзина пуста</div>'
        $('cart-footer').classList.add('hidden')
        return
      }

      $('cart-footer').classList.remove('hidden')
      $('cart-total').textContent = rub(total)

      const url = 'https://t.me/' + TG_CHANNEL + '?text=' + encodeURIComponent(buildTgMessage())
      $('send-order').href = url

      let html = ''
      for (const i of ci) {
        html += `<div class="cart-item">
          <div class="info">
            <div class="name">${esc(i.name)}</div>
            ${i.type ? `<div class="type-tag">${esc(i.type)}</div>` : ''}
            <div class="cart-price">${i.sale_price != null ? esc(rub(i.sale_price * i.cartQty)) : ''}</div>
          </div>
          <div class="qty-controls">
            <button class="qty-btn" onclick="setQty('${esc(i.id)}',${i.cartQty - 1})" aria-label="Убавить">−</button>
            <span class="qty-val">${i.cartQty}</span>
            <button class="qty-btn" onclick="setQty('${esc(i.id)}',${i.cartQty + 1})" aria-label="Добавить">+</button>
          </div>
        </div>`
      }
      $('cart-items').innerHTML = html
    }

    /* Overlay history: opening pushes a history entry, closing goes back,
       so the phone's back button closes the overlay instead of the page. */
    let detailOpen = false
    let cartOpen = false

    window.addEventListener('popstate', () => {
      if (detailOpen) hideDetail()
      else if (cartOpen) hideCart()
    })
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return
      if (detailOpen || cartOpen) history.back()
    })

    function openDetail(id) {
      const item = items.find((i) => i.id === id)
      if (!item) return
      const color = fandomColor.get(item.fandom || 'Другое') || fandomColors[0]
      const qty = item.stock_qty ?? 0
      const soldOut = qty <= 0
      const inCart = cart[item.id] > 0

      const imgHtml = (item.image_url
        ? `<img src="${esc(item.image_url)}" alt="" />`
        : `<span class="ph" style="color:${color}">${esc((item.fandom || '★').charAt(0).toUpperCase())}</span>`)
        + '<div class="holo"></div>'
        + (soldOut ? '<div class="stamp">Нет в наличии</div>' : '')
      $('detail-img').style.background = item.image_url ? 'none' : `linear-gradient(135deg,${color}22,${color}08)`
      $('detail-img').innerHTML = imgHtml

      let info = ''
      if (item.type) info += `<div class="detail-type" style="color:${color}">${esc(item.type)}</div>`
      if (item.fandom) info += `<div class="detail-fandom">${esc(item.fandom)}</div>`
      info += `<div class="detail-name">${esc(item.name)}</div>`
      if (item.description) info += `<div class="detail-desc">${esc(item.description)}</div>`
      info += `<div class="detail-bottom">`
      if (item.sale_price != null) info += `<span class="detail-price">${esc(rub(item.sale_price))}</span>`
      else info += '<span></span>'
      if (soldOut) {
        info += `<span class="detail-sold">Нет в наличии</span>`
      } else {
        info += `<button class="detail-add${inCart ? ' in-cart' : ''}" onclick="addToCart('${esc(item.id)}', this);openDetail('${esc(item.id)}')">${inCart ? 'В корзине: ' + cart[item.id] : 'В корзину'}</button>`
      }
      info += '</div>'
      info += `<button class="detail-share" onclick="copyItemLink('${esc(item.id)}', this)">Скопировать ссылку на товар</button>`
      $('detail-info').innerHTML = info

      if (!detailOpen) {
        detailOpen = true
        history.pushState({ overlay: 'detail' }, '', '#item=' + encodeURIComponent(item.id))
      }
      $('detail-overlay').classList.add('open')
      document.body.style.overflow = 'hidden'
      enableGyro()
    }

    function copyItemLink(id, btn) {
      const url = location.origin + location.pathname + '#item=' + encodeURIComponent(id)
      navigator.clipboard.writeText(url).then(() => {
        btn.textContent = 'Ссылка скопирована ✦'
        btn.classList.add('copied')
        setTimeout(() => {
          btn.textContent = 'Скопировать ссылку на товар'
          btn.classList.remove('copied')
        }, 2000)
      })
    }

    function hideDetail() {
      detailOpen = false
      $('detail-overlay').classList.remove('open')
      const dc = $('detail-card')
      dc.classList.remove('tilting')
      dc.style.setProperty('--rx', '0deg')
      dc.style.setProperty('--ry', '0deg')
      if (!cartOpen) document.body.style.overflow = ''
    }

    /* Holo tilt: pointer on desktop, gyroscope on mobile */
    function setTilt(el, px, py) {
      el.style.setProperty('--rx', ((px - 0.5) * 8).toFixed(2) + 'deg')
      el.style.setProperty('--ry', ((0.5 - py) * 8).toFixed(2) + 'deg')
      el.style.setProperty('--hx', (px * 100).toFixed(1))
      el.style.setProperty('--hy', (py * 100).toFixed(1))
    }

    if (!prefersReduced) {
      const dc = $('detail-card')
      dc.addEventListener('pointermove', (e) => {
        if (e.pointerType !== 'mouse') return
        const r = dc.getBoundingClientRect()
        dc.classList.add('tilting')
        setTilt(dc, (e.clientX - r.left) / r.width, (e.clientY - r.top) / r.height)
      })
      dc.addEventListener('pointerleave', () => {
        dc.classList.remove('tilting')
        dc.style.setProperty('--rx', '0deg')
        dc.style.setProperty('--ry', '0deg')
      })
      $('list').addEventListener('pointermove', (e) => {
        if (e.pointerType !== 'mouse') return
        const img = e.target.closest('.card-img')
        if (!img) return
        const r = img.getBoundingClientRect()
        img.style.setProperty('--hx', ((e.clientX - r.left) / r.width * 100).toFixed(1))
        img.style.setProperty('--hy', ((e.clientY - r.top) / r.height * 100).toFixed(1))
      })
    }

    let gyroBound = false
    function gyroHandler(e) {
      if (!detailOpen || e.beta == null) return
      const dc = $('detail-card')
      const px = Math.max(0, Math.min(1, 0.5 + (e.gamma || 0) / 60))
      const py = Math.max(0, Math.min(1, 0.5 + (45 - e.beta) / 90))
      dc.classList.add('tilting')
      setTilt(dc, px, py)
    }
    function enableGyro() {
      if (gyroBound || prefersReduced || typeof DeviceOrientationEvent === 'undefined') return
      gyroBound = true
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then((s) => { if (s === 'granted') window.addEventListener('deviceorientation', gyroHandler) })
          .catch(() => {})
      } else {
        window.addEventListener('deviceorientation', gyroHandler)
      }
    }

    function closeDetail(e) {
      if (e && e.target && !e.target.classList.contains('detail-overlay') && !e.target.classList.contains('detail-close')) return
      if (detailOpen) history.back()
    }

    function openCart() {
      cartOpen = true
      history.pushState({ overlay: 'cart' }, '')
      $('cart-overlay').classList.add('open')
      $('cart-panel').classList.add('open')
      document.body.style.overflow = 'hidden'
    }

    function hideCart() {
      cartOpen = false
      $('cart-overlay').classList.remove('open')
      $('cart-panel').classList.remove('open')
      if (!detailOpen) document.body.style.overflow = ''
    }

    function toggleCart() {
      if (cartOpen) history.back()
      else openCart()
    }

    function copyOrder() {
      const ci = getCartItems()
      if (!ci.length) return
      let msg = 'Привет! Хочу заказать:\n\n'
      for (const i of ci) {
        msg += `• ${i.name}` + (i.type ? ` (${i.type})` : '') + ` × ${i.cartQty}` + (i.sale_price ? ` — ${rub(i.sale_price * i.cartQty)}` : '') + '\n'
      }
      msg += `\nИтого: ${rub(getCartTotal())}`
      navigator.clipboard.writeText(msg).then(() => {
        const btn = $('copy-btn')
        btn.textContent = 'Скопировано!'
        btn.classList.add('copied')
        setTimeout(() => { btn.textContent = 'Копировать текст'; btn.classList.remove('copied') }, 2000)
      })
    }

    function setTypeFilter(idx) {
      typeFilter = idx < 0 ? null : typeList[idx]
      renderChips()
      render()
    }

    function toggleStockOnly() {
      stockOnly = !stockOnly
      renderChips()
      render()
    }

    function renderChips() {
      let html = `<button class="chip${!typeFilter ? ' active' : ''}" onclick="setTypeFilter(-1)">Все</button>`
      typeList.forEach((t, i) => {
        html += `<button class="chip${typeFilter === t ? ' active' : ''}" onclick="setTypeFilter(${i})">${esc(t)}</button>`
      })
      html += `<button class="chip chip-stock${stockOnly ? ' active' : ''}" onclick="toggleStockOnly()">В наличии</button>`
      $('chips').innerHTML = html
      $('chips').classList.remove('hidden')
    }

    function renderSkeleton() {
      let cards = ''
      for (let i = 0; i < 6; i++) cards += '<div class="sk sk-card"></div>'
      $('list').innerHTML = `<div class="fandom-group">
        <div class="sk sk-header"></div>
        <div class="card-grid">${cards}</div>
      </div>`
    }

    function render() {
      const q = $('search').value.trim().toLowerCase()
      let visible = items
      if (q) {
        visible = visible.filter((i) =>
          [i.name, i.type, i.fandom].some((f) => f && f.toLowerCase().includes(q)))
      }
      if (typeFilter) visible = visible.filter((i) => i.type === typeFilter)
      if (stockOnly) visible = visible.filter((i) => (i.stock_qty ?? 0) > 0)

      const totalUnits = visible.reduce((s, i) => s + Math.max(0, i.stock_qty ?? 0), 0)
      $('totals').textContent =
        `${visible.length} ${plural(visible.length, 'товар', 'товара', 'товаров')} · ${totalUnits} шт. в наличии`
      $('totals').classList.remove('hidden')

      // Single visible fandom → the whole page takes on its color
      const visibleFandoms = new Set(visible.map((i) => i.fandom || 'Другое'))
      if (visibleFandoms.size === 1) {
        document.documentElement.style.setProperty(
          '--page-accent', fandomColor.get([...visibleFandoms][0]) || '')
      } else {
        document.documentElement.style.removeProperty('--page-accent')
      }

      const groups = new Map()
      for (const i of visible) {
        const key = i.fandom || 'Другое'
        if (!groups.has(key)) groups.set(key, [])
        groups.get(key).push(i)
      }

      const animate = firstRender
      firstRender = false

      let html = ''
      let groupIdx = 0
      for (const [fandom, list] of groups) {
        const color = fandomColor.get(fandom) || fandomColors[0]
        const groupDelay = animate ? groupIdx * 100 : 0
        const fadeCls = animate ? ' fade-in' : ''
        const sorted = [
          ...list.filter((i) => (i.stock_qty ?? 0) > 0),
          ...list.filter((i) => (i.stock_qty ?? 0) <= 0),
        ]
        html += `<div class="fandom-group${fadeCls}"${animate ? ` style="animation-delay:${groupDelay}ms"` : ''}>
          <div class="fandom-header" style="border-bottom:1px solid ${color}33">
            <span class="orn" style="color:${color}">&#10022;</span>
            <h2>${esc(fandom)}</h2>
            <span class="fandom-count">· ${sorted.length}</span>
            <div class="line" style="background:linear-gradient(to right,${color}33,transparent)"></div>
          </div>
          <div class="card-grid">`

        for (let i = 0; i < sorted.length; i++) {
          const item = sorted[i]
          const qty = item.stock_qty ?? 0
          const soldOut = qty <= 0
          const inCart = cart[item.id] > 0
          const delay = animate ? i * 60 : 0
          const img = item.image_url
            ? `<img src="${esc(item.image_url)}" alt="" loading="lazy" />`
            : `<span class="ph" style="color:${color}">${esc((item.fandom || '★').charAt(0).toUpperCase())}</span>`
          const addBtn = !soldOut
            ? `<button class="add-btn${inCart ? ' in-cart' : ''}" data-id="${esc(item.id)}" onclick="addToCart('${esc(item.id)}', this)" aria-label="В корзину">${inCart ? cart[item.id] : '+'}</button>`
            : ''

          html += `<div class="card${fadeCls}${soldOut ? ' sold-out' : ''}" style="--fc:${color}${animate ? `;animation-delay:${groupDelay + delay}ms` : ''}">
            <div class="card-img" onclick="openDetail('${esc(item.id)}')" style="cursor:pointer;background:${item.image_url ? 'none' : `linear-gradient(135deg,${color}22,${color}08)`}">
              ${img}
              <div class="holo"></div>
              <span class="card-idx">${String(i + 1).padStart(2, '0')}</span>
              ${soldOut ? '<div class="stamp">Нет в наличии</div>' : `<div class="stock-badge in-stock">${qty} шт.</div>`}
            </div>
            <div class="card-info">
              ${item.type ? `<div class="card-type" style="color:${color}">${esc(item.type)}</div>` : ''}
              <div class="card-name">${esc(item.name)}</div>
              <div class="card-bottom">
                ${item.sale_price != null ? `<span class="card-price">${esc(rub(item.sale_price))}</span>` : '<span></span>'}
                ${addBtn}
              </div>
            </div>
          </div>`
        }

        html += '</div></div>'
        groupIdx++
      }

      $('list').innerHTML = html || '<p class="status">Ничего не найдено.</p>'
    }

    async function loadItems() {
      renderSkeleton()
      const { data, error } = await sb
        .from('public_stock')
        .select('id, type, fandom, name, image_url, sale_price, stock_qty, description')
        .order('fandom', { ascending: true, nullsFirst: false })
        .order('name')
      if (error) {
        $('list').innerHTML = ''
        status.textContent =
          'Не удалось загрузить: ' + error.message +
          ' — если ошибка про "public_stock", выполните supabase/public_stock_view.sql в SQL Editor Supabase (см. README).'
        status.classList.remove('hidden')
        return
      }
      items = data
      buildFandomColors()
      typeList = [...new Set(items.map((i) => i.type).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, 'ru'))
      loadCart()
      Object.keys(cart).forEach((id) => {
        const item = items.find((i) => i.id === id)
        const max = item ? (item.stock_qty ?? 0) : 0
        if (max <= 0) delete cart[id]
        else cart[id] = Math.min(cart[id], max)
      })
      saveCart()
      renderChips()
      render()
      updateCartUI()

      // Deep link: #item=<id> opens that item's detail view
      const hash = location.hash.match(/^#item=(.+)$/)
      if (hash) {
        const id = decodeURIComponent(hash[1])
        if (items.find((i) => i.id === id)) {
          history.replaceState(null, '', location.pathname + location.search)
          openDetail(id)
        }
      }
    }

    if (configured) {
      loadItems()
      $('search').addEventListener('input', render)
    }
  </script>
</body>
</html>
